app:
  gpt:
    # gpt接口类型, 可选值: deepseek, openai
    provider: deepseek
    # gpt接口密钥
    api_key: sk-xxxxxxxxxxxxxxx
    # 模型名称, 默认 deepseek-chat
    model: deepseek-chat
  exchange:
    # 交易接口类型, 可选值: binance, okx
    type: binance
    api_key: xxxx
    # 交易接口密钥
    api_secret: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    # OKX交易所需要的密码（仅在使用OKX时需要配置）
    password: your_okx_password
  http_client:
    # 交易接口代理,不配置默认不启用
    proxy_enable: false
    # 代理地址
    proxy_url: http://127.0.0.1:10809
  web:
    # FastAPI 服务监听地址
    host: 127.0.0.1
    # FastAPI 服务监听端口
    port: 18080
    # 是否为调试模式
    debug: true
    # 响应中是否输出 trace，生产环境建议关闭
    show_trace: true
    # JWT 密钥，生产环境请务必修改
    jwt_secret: change-me-in-production
    # 登录 token 有效期（分钟）
    jwt_expire_minutes: 720
    # 图形验证码有效期（秒）
    captcha_expire_seconds: 300
    # 允许访问 FastAPI 的前端来源
    cors_allow_origins:
      - http://127.0.0.1:5173
      - http://localhost:5173
    init_admin:
      # 启动时是否自动初始化管理员账号
      enabled: true
      username: admin
      password: admin123456
      email: admin@example.com
      nickname: 管理员
      remark: 系统初始化管理员
  trade:
    # 是否沙盒模式, 默认True
    sandbox_trade: true
    # 交易对,默认BTC/USDT
    symbol: BTC/USDT
    # 交易时间间隔,默认15分钟
    timeframe: 15
    # 交易数据个数,默认100
    limit: 100
    persistence:
      # 是否启用交易记录持久化
      enabled: true
      # 数据库连接地址，默认使用本地 SQLite；将来可改为 MySQL 等其他数据库 DSN
      database_url: sqlite:///./.aitrade/trades.sqlite3
      # 兼容旧配置时可继续使用 sqlite_path，但优先推荐 database_url
      # sqlite_path: ./.aitrade/trades.sqlite3
      # 是否持久化当前持仓状态
      persist_position: true
      # 启动时是否从本地持久化快照恢复持仓
      restore_position_on_startup: false
    strategy:
      # 可选值: gpt, btc_spot_breakout
      type: gpt
      gpt:
        # GPT策略最低置信度阈值
        min_confidence: 0.7
      btc_spot_breakout:
        # Donchian突破入场窗口
        donchian_entry: 20
        # Donchian跌破出场窗口
        donchian_exit: 10
        # 趋势过滤EMA周期，15分钟下 96 约等于1天
        ema_period: 96
        # EMA斜率回看根数
        ema_slope_lookback: 4
        # ATR周期
        atr_period: 14
        # 初始止损ATR倍数
        atr_stop_mult: 2.5
        # 追踪止损ATR倍数
        atr_trail_mult: 3.0
        # 突破缓冲，单位 bps
        breakout_buffer_bps: 10
        # 是否要求MACD柱线大于0
        confirm_macd: true
        # 是否要求成交量放大
        confirm_volume: true
        # 成交量均线周期
        volume_ma_period: 20
        # 成交量放大倍数
        volume_multiplier: 1.1
        # 单笔风险比例
        default_risk_per_trade: 0.01
