app:
  exchange:
    # 交易接口类型，可选值：binance、okx
    type: binance
    api_key: xxxx
    # 交易接口密钥
    api_secret: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    # OKX 交易所需要的密码（仅在使用 OKX 时需要配置）
    password: your_okx_password

  http_client:
    # 交易所访问与 freqtrade 历史数据下载共用这组代理配置，不配置默认不启用
    proxy_enable: false
    # 代理地址
    proxy_url: http://127.0.0.1:10809

  # 部署级数据根目录；SQLite、系统日志、历史数据与 Freqtrade user_data 都会自动派生到这里
  data_root_dir: ~/.aitrade

  web:
    # FastAPI 服务监听端口；host/debug/show_trace/jwt 过期时间等其余参数若不写，会使用代码默认值
    port: 18080
    # JWT 密钥，生产环境请务必修改
    jwt_secret: change-me-in-production
    # 允许访问 FastAPI 的前端来源
    cors_allow_origins:
      - http://127.0.0.1:5173
      - http://localhost:5173

  trade:
    # Web 管理台场景下，这里只需要保留 persistence 结构占位。
    # 如果直接运行 Bot/CLI，再额外补齐 trade_mode / paper_balance / symbol / timeframe / limit / strategy。
    persistence: {}

  backtest:
    # freqtrade 命令名，可替换为绝对路径
    freqtrade_bin: freqtrade
